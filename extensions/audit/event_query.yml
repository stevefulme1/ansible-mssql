---
# extensions/audit/event_query.yml
# Maps module return values to the AAP Normalized Resource Taxonomy
# for indirect node counting.
#
# MSSQL modules return API response dicts.  Azure SQL modules use
# server_name/db_name identifiers; on-prem modules use similar patterns.

stevefulme1.mssql.mssql_database:
  query: >-
    {
      name: .database.name,
      canonical_facts: {
        uuid: .database.id
      },
      facts: {
        device_type: "database_relational"
      }
    }

stevefulme1.mssql.mssql_availability_group:
  query: >-
    {
      name: .ag.name,
      canonical_facts: {
        uuid: .ag.id
      },
      facts: {
        device_type: "database_relational"
      }
    }


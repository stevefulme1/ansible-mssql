---
argument_specs:
  main:
    short_description: "Run index rebuild, statistics update, and integrity checks"
    options:
      mssql_maintenance_host:
        description: Target host address
        type: str
        required: true
      mssql_maintenance_username:
        description: Authentication username
        type: str
      mssql_maintenance_password:
        description: Authentication password
        type: str
      mssql_maintenance_api_key:
        description: API key for authentication
        type: str
      mssql_maintenance_validate_certs:
        description: Validate SSL certificates
        type: bool
        default: true
      mssql_maintenance_state:
        description: Desired state
        type: str
        default: present
        choices: [present, absent]

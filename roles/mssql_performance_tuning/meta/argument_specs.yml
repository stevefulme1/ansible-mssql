---
argument_specs:
  main:
    short_description: "Apply performance tuning recommendations"
    options:
      mssql_performance_tuning_host:
        description: Target host address
        type: str
        required: true
      mssql_performance_tuning_username:
        description: Authentication username
        type: str
      mssql_performance_tuning_password:
        description: Authentication password
        type: str
        no_log: true
      mssql_performance_tuning_api_key:
        description: API key for authentication
        type: str
        no_log: true
      mssql_performance_tuning_validate_certs:
        description: Validate SSL certificates
        type: bool
        default: true
      mssql_performance_tuning_state:
        description: Desired state
        type: str
        default: present
        choices: [present, absent]

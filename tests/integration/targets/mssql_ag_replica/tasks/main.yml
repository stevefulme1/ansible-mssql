---
# Integration tests for stevefulme1.mssql.mssql_ag_replica
# Full CRUD lifecycle: CREATE -> idempotency -> UPDATE -> DELETE -> idempotency

- name: Test mssql_ag_replica CRUD lifecycle
  block:
    - name: Create ag_replica (check mode)
      stevefulme1.mssql.mssql_ag_replica:
        host: "{{ test_host }}"
        username: "{{ test_username | default(omit) }}"
        password: "{{ test_password | default(omit) }}"
        api_key: "{{ test_api_key | default(omit) }}"
        validate_certs: "{{ test_validate_certs | default(false) }}"
        name: "test-ag_replica"
        state: present
      check_mode: true
      register: check_result

    - name: Verify check mode reports changed
      ansible.builtin.assert:
        that:
          - check_result is changed

    - name: Create ag_replica
      stevefulme1.mssql.mssql_ag_replica:
        host: "{{ test_host }}"
        username: "{{ test_username | default(omit) }}"
        password: "{{ test_password | default(omit) }}"
        api_key: "{{ test_api_key | default(omit) }}"
        validate_certs: "{{ test_validate_certs | default(false) }}"
        name: "test-ag_replica"
        state: present
      register: create_result

    - name: Verify create result
      ansible.builtin.assert:
        that:
          - create_result is changed
          - create_result.ag_replica is defined

    - name: Create ag_replica again (idempotency)
      stevefulme1.mssql.mssql_ag_replica:
        host: "{{ test_host }}"
        username: "{{ test_username | default(omit) }}"
        password: "{{ test_password | default(omit) }}"
        api_key: "{{ test_api_key | default(omit) }}"
        validate_certs: "{{ test_validate_certs | default(false) }}"
        name: "test-ag_replica"
        state: present
      register: idem_result

    - name: Verify idempotency
      ansible.builtin.assert:
        that:
          - idem_result is not changed

    - name: Fetch ag_replica info
      stevefulme1.mssql.mssql_ag_replica_info:
        host: "{{ test_host }}"
        username: "{{ test_username | default(omit) }}"
        password: "{{ test_password | default(omit) }}"
        api_key: "{{ test_api_key | default(omit) }}"
        validate_certs: "{{ test_validate_certs | default(false) }}"
      register: info_result

    - name: Verify info returns data
      ansible.builtin.assert:
        that:
          - info_result.ag_replicas is defined

    - name: Delete ag_replica
      stevefulme1.mssql.mssql_ag_replica:
        host: "{{ test_host }}"
        username: "{{ test_username | default(omit) }}"
        password: "{{ test_password | default(omit) }}"
        api_key: "{{ test_api_key | default(omit) }}"
        validate_certs: "{{ test_validate_certs | default(false) }}"
        name: "test-ag_replica"
        state: absent
      register: delete_result

    - name: Verify delete result
      ansible.builtin.assert:
        that:
          - delete_result is changed

    - name: Delete ag_replica again (idempotency)
      stevefulme1.mssql.mssql_ag_replica:
        host: "{{ test_host }}"
        username: "{{ test_username | default(omit) }}"
        password: "{{ test_password | default(omit) }}"
        api_key: "{{ test_api_key | default(omit) }}"
        validate_certs: "{{ test_validate_certs | default(false) }}"
        name: "test-ag_replica"
        state: absent
      register: delete_idem_result

    - name: Verify delete idempotency
      ansible.builtin.assert:
        that:
          - delete_idem_result is not changed

  always:
    - name: Cleanup - ensure test resource is removed
      stevefulme1.mssql.mssql_ag_replica:
        host: "{{ test_host }}"
        username: "{{ test_username | default(omit) }}"
        password: "{{ test_password | default(omit) }}"
        api_key: "{{ test_api_key | default(omit) }}"
        validate_certs: "{{ test_validate_certs | default(false) }}"
        name: "test-ag_replica"
        state: absent
      failed_when: false

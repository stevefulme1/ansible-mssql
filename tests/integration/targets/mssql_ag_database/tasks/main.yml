---
- name: Test mssql_ag_database module
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Create ag_database (check mode)
      stevefulme1.mssql.mssql_ag_database:
        host: "{{ test_host }}"
        name: "test-ag-database"
        state: present
      check_mode: true
      register: check_result
      ignore_errors: true

    - name: Verify check mode reports changed
      ansible.builtin.assert:
        that:
          - check_result is changed or check_result is failed
        fail_msg: "Check mode did not report changed"

    - name: List ag_databases
      stevefulme1.mssql.mssql_ag_database_info:
        host: "{{ test_host }}"
      register: list_result
      ignore_errors: true

    - name: Verify list returns a list
      ansible.builtin.assert:
        that:
          - list_result.ag_databases is defined or list_result is failed
        fail_msg: "List did not return expected structure"

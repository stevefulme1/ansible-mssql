---
- name: Test azure_sql_firewall module
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Create sql_firewall (check mode)
      stevefulme1.mssql.azure_sql_firewall:
        host: "{{ test_host }}"
        name: "test-sql-firewall"
        state: present
      check_mode: true
      register: check_result
      ignore_errors: true

    - name: Verify check mode reports changed
      ansible.builtin.assert:
        that:
          - check_result is changed or check_result is failed
        fail_msg: "Check mode did not report changed"

    - name: List sql_firewalls
      stevefulme1.mssql.azure_sql_firewall_info:
        host: "{{ test_host }}"
      register: list_result
      ignore_errors: true

    - name: Verify list returns a list
      ansible.builtin.assert:
        that:
          - list_result.sql_firewalls is defined or list_result is failed
        fail_msg: "List did not return expected structure"
